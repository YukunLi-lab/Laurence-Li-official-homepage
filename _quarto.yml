project:
  type: website
  output-dir: _site

website:
  title: "Laurence Li | 学术主页"
  description: "个人学术网站 - 展示学术背景、科研经历和成果"
  page-footer: |
    <p>&copy; 2025 Laurence Li. All rights reserved.</p>
    <p>最后更新：2025年3月</p>

  navbar:
    background: "#4A90A4"
    foreground: "#ffffff"
    logo: "images/profile/headshot-placeholder.png"
    right:
      - text: "关于"
        href: "#about"
      - text: "教育"
        href: "#education"
      - text: "科研"
        href: "#research"
      - text: "项目"
        href: "#projects"
      - text: "成果"
        href: "#publications"
      - text: "技能"
        href: "#skills"
      - text: "荣誉"
        href: "#honors"
      - text: "联系"
        href: "#contact"

  sidebar:
    style: "docked"
    search: true
    tools:
      - icon: github
        href: "https://github.com/YukunLi-lab"
        text: "GitHub"

format:
  html:
    css: styles/styles.css
    smooth-scroll: true
    linkcolor: "#2980B9"
    urlcolor: "#2980B9"
    highlight-style: github
    fontcolor: "#2D3436"
    fontsize: "16px"
    linestretch: "1.6"
    toc: true
    toc-title: "目录"
    toc-location: left

execute:
  echo: false
  warning: false

metadata:
  author:
    name: "Laurence Li"
    affiliation: "中山大学"
    email: "liyukun@student.sysu.edu.cn"
